
services:
  audion-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - AUDION_ADMIN_USER=admin
      - AUDION_ADMIN_PASSWORD=changeme
      - AUDION_JWT_SECRET=your-secret-key-here-change-this-in-production
      - AUDION_DATA_DIR=/data
      - AUDION_PORT=8080
      - RUST_LOG=info
      - AUDION_JWT_EXPIRATION_DAYS=7
      - AUDION_CORS_ORIGIN=*
      - AUDION_MAX_BODY_SIZE=262144000
      - AUDION_PUBLIC_DIR=/app/frontend/dist
      - PUID=10001
      - PGID=10001
    restart: unless-stopped

  audion-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - audion-server
    restart: unless-stopped
