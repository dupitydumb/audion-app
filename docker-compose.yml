version: '3.8'

services:
  audion-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0:8080"
    volumes:
      - ./data:/data
    environment:
      - AUDION_ADMIN_USER=admin
      - AUDION_ADMIN_PASSWORD=changeme
      - AUDION_JWT_SECRET=your-secret-key-here-change-this-in-production
      - AUDION_DATA_DIR=/data
      - AUDION_PORT=8080
      - RUST_LOG=info
    restart: unless-stopped

  audion-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - audion-server
    restart: unless-stopped
